apiVersion: orionmesh.dev/v1
kind: Service
metadata: { name: amiga-search-svc }
spec:
  runtime:
    kind: docker
    image: amiga-search:latest
  replicas: 1
  capabilities:
    - name: search
      attributes:
        dataset: amiga_schematics
        protocol: http
        index_type: lucene
    - name: web
      attributes:
        protocol: http
