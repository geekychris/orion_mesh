apiVersion: orionmesh.dev/v1
kind: Service
metadata:
  name: redis-cache
spec:
  runtime:
    kind: docker
    image: redis:7-alpine
    args: ["--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    env:
      REDIS_LOG_LEVEL: notice
  replicas: 1
  ports:
    - { name: redis, port: 6379 }
  health:
    kind: tcp
    port: 6379
    interval_seconds: 10
  restart_policy: always
