apiVersion: orionmesh.dev/v1
kind: Service
metadata: { name: orion-webhook }
spec:
  replicas: 1
  restart_policy: on_failure
  runtime:
    kind: native
    exec: target/debug/orion-webhook
    args: []
    env:
      BIND: "0.0.0.0:8080"
      NATS_URL: "nats://127.0.0.1:4222"
      ORION_QUEUE_NAME: webhooks
      ORION_QUEUE_SUBJECT: orion.queue.webhooks
      ORION_QUEUE_STREAM: ORION_QUEUE_WEBHOOKS
      RUST_LOG: info
      # WEBHOOK_SECRET: change-me-to-enable-signature-verification
  ports:
    - { name: http, port: 8080, protocol: tcp }
