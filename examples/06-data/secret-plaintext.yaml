apiVersion: orionmesh.dev/v1
kind: Secret
metadata:
  name: openai-api-key
  annotations:
    description: |
      Resolved at workload startup by the agent's SecretResolver.
      With the default PlaintextResolver, this reads from
      ~/.config/orion/secrets/openai-api-key (or $ORION_SECRETS_DIR/openai-api-key).
spec:
  vault_ref: "plaintext://openai-api-key"
