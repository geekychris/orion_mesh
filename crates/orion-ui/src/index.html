<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OrionMesh</title>
  <style>
    :root {
      --fg: #111;
      --muted: #666;
      --dim: #999;
      --line: #e2e2e2;
      --bg: #fafafa;
      --bg-sel: #eef4ff;
      --accent: #0b6e3d;
      --err: #b00020;
      --warn: #b65a00;
      --code-bg: #1e1e1e;
      --code-fg: #d4d4d4;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
      margin: 0; padding: 0;
      color: var(--fg);
      font-size: 14px;
    }
    header {
      padding: 1rem 1.5rem .75rem;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 1rem;
    }
    h1 { font-size: 1.2rem; margin: 0; }
    .subtitle { color: var(--muted); font-size: .8rem; }
    .subtitle code { background: var(--bg); padding: .1rem .35rem; border-radius: 3px; }
    .pill {
      display: inline-block; padding: .1rem .5rem; border-radius: 999px;
      background: var(--bg); color: var(--muted); font-size: .75rem;
    }
    .pill.live { background: #e8f6ee; color: var(--accent); }
    .pill.offline { background: #fde2e2; color: var(--err); }

    nav.tabs {
      display: flex; gap: .25rem;
      padding: 0 1rem;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }
    nav.tabs button {
      padding: .65rem 1rem;
      border: none; background: transparent;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      font-size: .9rem;
      white-space: nowrap;
    }
    nav.tabs button:hover { color: var(--fg); }
    nav.tabs button.active {
      color: var(--fg);
      border-bottom-color: var(--accent);
    }
    nav.tabs button .count {
      background: var(--bg); color: var(--muted);
      padding: .05rem .35rem; border-radius: 3px;
      font-size: .7rem; margin-left: .35rem;
    }
    nav.tabs button.active .count { background: #d8eddf; color: var(--accent); }

    main {
      padding: 1rem 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    section.view { display: none; }
    section.view.active { display: block; }

    .panel { display: grid; grid-template-columns: 1fr 1.2fr; gap: 1.25rem; }
    .panel .list { min-width: 0; }
    .panel .detail { min-width: 0; }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: .88rem;
    }
    th, td {
      border: 1px solid var(--line);
      padding: .45rem .7rem;
      text-align: left;
      vertical-align: top;
    }
    th { background: var(--bg); font-weight: 600; font-size: .8rem; color: var(--muted); }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: var(--bg); }
    tbody tr.selected { background: var(--bg-sel); }

    .runtime-pill {
      display: inline-block;
      background: #eef; color: #224;
      padding: .05rem .4rem; border-radius: 3px;
      font-size: .72rem; margin-right: .25rem;
    }
    .dim { color: var(--dim); }
    .muted { color: var(--muted); }
    .small { font-size: .8rem; }

    .err {
      padding: .5rem .75rem;
      border-left: 3px solid var(--err);
      background: #fff5f5;
      margin-bottom: 1rem;
      display: none;
    }
    .err.show { display: block; }
    .notice {
      padding: .5rem .75rem;
      border-left: 3px solid var(--warn);
      background: #fff8ef;
      margin-bottom: 1rem;
      font-size: .85rem;
    }

    .detail-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: .5rem;
    }
    .detail-header h2 { margin: 0; font-size: 1rem; }
    .detail-header .actions { display: flex; gap: .5rem; }
    button.action {
      padding: .35rem .75rem; border: 1px solid var(--line);
      background: white; cursor: pointer; border-radius: 4px;
      font-size: .8rem; color: var(--fg);
    }
    button.action:hover { background: var(--bg); }
    button.action.danger { color: var(--err); border-color: #f5c2c7; }
    button.action.danger:hover { background: #fff5f5; }
    button.action.primary {
      background: var(--accent); color: white; border-color: var(--accent);
    }
    button.action.primary:hover { background: #095f33; }
    button.action[disabled] { opacity: .5; cursor: not-allowed; }

    pre.yaml {
      background: var(--code-bg); color: var(--code-fg);
      padding: 1rem; border-radius: 4px;
      max-height: 60vh; overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .8rem; line-height: 1.5;
      margin: 0;
    }
    pre.yaml .k { color: #9cdcfe; }
    pre.yaml .s { color: #ce9178; }
    pre.yaml .n { color: #b5cea8; }
    pre.yaml .b { color: #569cd6; }

    .apply-form { display: flex; flex-direction: column; gap: .75rem; }
    textarea.yaml-input {
      width: 100%; min-height: 320px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .85rem; padding: .75rem;
      border: 1px solid var(--line); border-radius: 4px;
      background: var(--bg);
    }
    .apply-buttons { display: flex; gap: .5rem; align-items: center; }
    .apply-result {
      padding: .5rem .75rem; border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .8rem; word-break: break-word;
      display: none;
    }
    .apply-result.ok { background: #e8f6ee; color: var(--accent); display: block; }
    .apply-result.err { background: #fff5f5; color: var(--err); display: block; white-space: pre-wrap; }

    .phase-note {
      background: #fff8ef; border-left: 3px solid var(--warn);
      padding: .5rem .75rem; font-size: .82rem;
      margin-bottom: .75rem;
    }
    .phase-note strong { color: var(--warn); }

    /* ---- demo cards (Demo tab) ---- */
    .demo-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
      background: white;
    }
    .demo-card h3 { margin: 0 0 .25rem; font-size: .95rem; }
    .demo-card .desc { color: var(--muted); font-size: .8rem; margin-bottom: .75rem; }
    .demo-card label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: .25rem; }
    .demo-card .row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
    }
    .demo-card textarea {
      width: 100%;
      min-height: 140px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .8rem;
      padding: .5rem;
      border: 1px solid var(--line);
      border-radius: 4px;
    }
    .verdict {
      padding: .5rem .75rem;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .8rem;
      margin-top: .5rem;
      background: var(--bg);
    }
    .verdict.match { background: #e8f6ee; color: var(--accent); }
    .verdict.nomatch { background: #fff5f5; color: var(--err); }
    .verdict.neutral { background: var(--bg); color: var(--fg); }
    .match-line { padding: .1rem 0; font-family: ui-monospace, Menlo, monospace; }
    .match-line .ok { color: var(--accent); font-weight: 600; margin-right: .4rem; }
    .match-line .fail { color: var(--err); font-weight: 600; margin-right: .4rem; }
    .bulk-step { padding: .15rem 0; font-family: ui-monospace, Menlo, monospace; font-size: .8rem; }
    .bulk-step .ok { color: var(--accent); }
    .bulk-step .fail { color: var(--err); }
    .bulk-step .pending { color: var(--muted); }

    /* ---- live log viewer ---- */
    .logs-panel { margin-top: 1rem; }
    .logs-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: .25rem;
    }
    .logs-header h3 { margin: 0; font-size: .9rem; }
    .logs-header .meta { color: var(--muted); font-size: .75rem; }
    .logs-tail {
      background: var(--code-bg); color: var(--code-fg);
      padding: .75rem; border-radius: 4px;
      max-height: 280px; overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .78rem; line-height: 1.45;
      white-space: pre-wrap;
    }
    .log-row { display: grid; grid-template-columns: 5.5rem 4rem 1fr; gap: .5rem; }
    .log-row .ts { color: #888; }
    .log-row .stream { color: #6cc; }
    .log-row .stream.err { color: #f88; }
    .logs-empty { color: var(--muted); font-size: .8rem; padding: .5rem; }

    footer {
      margin-top: 2rem; padding: 1rem 1.5rem;
      color: var(--muted); font-size: .75rem;
      border-top: 1px solid var(--line);
    }

    .empty {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <h1>OrionMesh</h1>
  <span id="status" class="pill">connecting…</span>
  <div class="subtitle">
    Controller <code>__CONTROLLER_URL__</code>
    <span class="dim">·</span>
    refresh: <span id="refresh-clock">–</span>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<main>
  <div id="err" class="err"></div>
  <div id="views"></div>
</main>

<footer>
  OrionMesh Phase 1 substrate · UI talks to <code>__CONTROLLER_URL__</code> ·
  source: <a href="https://github.com/geekychris/orion_mesh">github.com/geekychris/orion_mesh</a>
</footer>

<script>
  const CTRL = "__CONTROLLER_URL__";
  // Kinds whose pages we want to be able to OPEN even when empty (so the operator
  // can apply the first one). Other kinds show up automatically when populated.
  const ALWAYS_VISIBLE = new Set(["Nodes", "Apply"]);

  // ------------------------------------------------------------- DOM helpers
  const $ = sel => document.querySelector(sel);
  const $$ = sel => Array.from(document.querySelectorAll(sel));

  function el(tag, attrs = {}, ...children) {
    const e = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs || {})) {
      if (k === "class") e.className = v;
      else if (k === "html") e.innerHTML = v;
      else if (k === "onclick") e.onclick = v;
      else if (k.startsWith("data-")) e.setAttribute(k, v);
      else e.setAttribute(k, v);
    }
    for (const c of children.flat()) {
      if (c == null) continue;
      e.append(c.nodeType ? c : document.createTextNode(c));
    }
    return e;
  }

  function fmtBytes(b) {
    if (!b) return "–";
    const u = ["B","KB","MB","GB","TB"]; let i = 0; let n = b;
    while (n >= 1024 && i < u.length-1) { n /= 1024; i++; }
    return `${n.toFixed(n < 10 ? 1 : 0)} ${u[i]}`;
  }

  function showErr(msg) {
    const e = $("#err");
    e.textContent = msg;
    e.classList.add("show");
    const s = $("#status");
    s.className = "pill offline";
    s.textContent = "offline";
  }
  function clearErr() {
    $("#err").classList.remove("show");
    const s = $("#status");
    s.className = "pill live";
    s.textContent = "live";
  }

  // ------------------------------------------------------------- YAML output
  // Cheap pretty-printer: parse JSON → emit indented YAML-ish with serialization
  // close enough to what `orion get` would print. Not a strict YAML 1.2 emitter.
  function jsonToYaml(v, indent = 0) {
    const pad = "  ".repeat(indent);
    if (v === null || v === undefined) return "null";
    if (typeof v === "string") {
      // Need quotes? Anything containing special chars or that parses as a number.
      const needsQuote = /[:\\{}\\[\\],&*#?|<>=!%@`'"\\n]/.test(v) || /^\\s/.test(v) || /\\s$/.test(v) || /^(true|false|null|yes|no|on|off|\\d)/i.test(v) || v === "";
      return needsQuote ? JSON.stringify(v) : v;
    }
    if (typeof v === "number" || typeof v === "boolean") return String(v);
    if (Array.isArray(v)) {
      if (v.length === 0) return "[]";
      return v.map(item => {
        if (typeof item === "object" && item !== null && !Array.isArray(item)) {
          const inner = jsonToYaml(item, indent + 1).split("\\n");
          return `${pad}- ${inner[0].trimStart()}\\n${inner.slice(1).join("\\n")}`;
        }
        return `${pad}- ${jsonToYaml(item, indent + 1)}`;
      }).join("\\n");
    }
    if (typeof v === "object") {
      const keys = Object.keys(v);
      if (keys.length === 0) return "{}";
      return keys.map(k => {
        const val = v[k];
        if (val === null) return `${pad}${k}: null`;
        if (typeof val === "object") {
          if (Array.isArray(val) && val.length === 0) return `${pad}${k}: []`;
          if (!Array.isArray(val) && Object.keys(val).length === 0) return `${pad}${k}: {}`;
          return `${pad}${k}:\\n${jsonToYaml(val, indent + 1)}`;
        }
        return `${pad}${k}: ${jsonToYaml(val, 0)}`;
      }).join("\\n");
    }
    return String(v);
  }

  function colorizeYaml(s) {
    return s
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/^(\\s*)([a-zA-Z_][a-zA-Z0-9_-]*)(:)/gm, '$1<span class="k">$2</span>$3')
      .replace(/: (true|false|null)$/gm, ': <span class="b">$1</span>')
      .replace(/: (-?\\d+(?:\\.\\d+)?)$/gm, ': <span class="n">$1</span>')
      .replace(/: "([^"]*)"/g, ': <span class="s">"$1"</span>');
  }

  // ------------------------------------------------------------- state
  const state = {
    activeTab: "Nodes",
    nodes: [],
    kinds: [],
    countsByKind: {},
    listByKind: {},
    selectedByKind: {},  // kind -> name of selected row
    logSince: {},        // `${kind}/${name}` -> seq of last seen entry
    logTimers: {},       // `${kind}/${name}` -> setInterval id (one per visible panel)
  };

  // ------------------------------------------------------------- API calls
  async function api(path, opts = {}) {
    const r = await fetch(`${CTRL}${path}`, opts);
    if (!r.ok) {
      const txt = await r.text().catch(() => r.statusText);
      throw new Error(`${r.status} ${r.statusText}: ${txt}`);
    }
    if (r.status === 204) return null;
    const ct = r.headers.get("content-type") || "";
    return ct.startsWith("application/json") ? await r.json() : await r.text();
  }

  // ------------------------------------------------------------- refresh
  async function refresh() {
    try {
      const [nodes, kindsRes] = await Promise.all([
        api("/v1/nodes"),
        api("/v1/kinds"),
      ]);
      state.nodes = nodes;
      state.kinds = kindsRes.kinds;
      const counts = await Promise.all(state.kinds.map(async k => {
        try {
          const rows = await api(`/v1/resources/${k}`);
          state.listByKind[k] = rows;
          return [k, rows.length];
        } catch (_) { return [k, 0]; }
      }));
      state.countsByKind = Object.fromEntries(counts);

      autoRender();
      clearErr();
      $("#refresh-clock").textContent = new Date().toLocaleTimeString();
    } catch (e) {
      showErr(String(e));
    }
  }

  // ------------------------------------------------------------- render: tabs
  function renderTabs() {
    const tabs = $("#tabs");
    tabs.innerHTML = "";
    const make = (name, count, active) => {
      const b = el("button", { class: active ? "active" : "" }, name);
      if (count != null) b.append(el("span", { class: "count" }, String(count)));
      b.onclick = () => { state.activeTab = name; render(); };
      tabs.append(b);
    };

    make("Nodes", state.nodes.length, state.activeTab === "Nodes");
    for (const k of state.kinds) {
      const c = state.countsByKind[k] || 0;
      if (c === 0) continue;
      make(k, c, state.activeTab === k);
    }
    make("Apply", null, state.activeTab === "Apply");
    make("Diag",  null, state.activeTab === "Diag");
    make("Demo",  null, state.activeTab === "Demo");
  }

  // ------------------------------------------------------------- render: views
  // Called by user actions (tab click, row click, apply, delete, dispatch).
  // Always wipes the current view and rebuilds it.
  function render() {
    for (const id of Object.values(state.logTimers)) clearInterval(id);
    state.logTimers = {};
    renderTabs();
    const v = $("#views");
    v.innerHTML = "";
    if (state.activeTab === "Nodes") v.append(viewNodes());
    else if (state.activeTab === "Apply") v.append(viewApply());
    else if (state.activeTab === "Demo") v.append(viewDemo());
    else if (state.activeTab === "Diag") v.append(viewDiag());
    else v.append(viewKind(state.activeTab));
  }

  // Auto-poll: only refresh tab counts + the Nodes table. Don't disturb the
  // detail panel or log poller on other tabs.
  function autoRender() {
    renderTabs();
    if (state.activeTab === "Nodes") {
      const v = $("#views");
      v.innerHTML = "";
      v.append(viewNodes());
    }
  }

  function viewNodes() {
    const wrap = el("section", { class: "view active" });
    if (state.nodes.length === 0) {
      wrap.append(el("div", { class: "empty" }, "no agents reporting yet"));
      return wrap;
    }
    const tbl = el("table");
    tbl.append(el("thead", {}, el("tr", {},
      el("th", {}, "Node"),
      el("th", {}, "Arch / OS"),
      el("th", {}, "CPU / Mem"),
      el("th", {}, "Runtimes"),
      el("th", {}, "Last seen"))));
    const tb = el("tbody");
    for (const n of state.nodes) {
      const inv = n.inventory || {};
      tb.append(el("tr", {},
        el("td", {}, el("strong", {}, n.node_id), el("br"), el("span", { class: "dim small" }, `v${n.agent_version}`)),
        el("td", {}, inv.arch ? `${inv.arch} · ${inv.os}` : el("span", { class: "dim" }, "–")),
        el("td", {}, inv.cpu_cores ? `${inv.cpu_cores} cores · ${fmtBytes(inv.mem_total_bytes)}` : el("span", { class: "dim" }, "–")),
        el("td", { html: (inv.runtimes || []).map(r => `<span class="runtime-pill">${r}</span>`).join("") || '<span class="dim">–</span>' }),
        el("td", {}, new Date(n.last_seen_at).toLocaleString())));
    }
    tbl.append(tb);
    wrap.append(tbl);
    return wrap;
  }

  function viewKind(kind) {
    const wrap = el("section", { class: "view active" });
    const rows = state.listByKind[kind] || [];
    const isWorkload = (kind === "Service" || kind === "Task");

    if (isWorkload) {
      const note = el("div", { class: "phase-note" });
      note.innerHTML =
        `<strong>Phase 2:</strong> Applying stores the ${kind}. ` +
        `<strong>Dispatch</strong> publishes <code>orion.control.&lt;node&gt;.run</code> ` +
        `to a live agent which launches the native runtime; stdout/stderr stream back ` +
        `on <code>orion.logs.&lt;node&gt;</code> and appear in the Logs panel below. ` +
        `The real scheduler (filtering + scoring + reconciliation) lands in Phase 5.`;
      wrap.append(note);
    }

    if (rows.length === 0) {
      wrap.append(el("div", { class: "empty" }, `no ${kind} resources yet — apply one from the Apply tab`));
      return wrap;
    }

    const panel = el("div", { class: "panel" });

    // Left: list
    const list = el("div", { class: "list" });
    const tbl = el("table");
    tbl.append(el("thead", {}, el("tr", {},
      el("th", {}, "Name"),
      el("th", {}, "Summary"))));
    const tb = el("tbody");
    const selected = state.selectedByKind[kind] || rows[0]?.metadata?.name;
    for (const r of rows) {
      const name = r.metadata.name;
      const tr = el("tr", { class: name === selected ? "selected" : "" });
      tr.onclick = () => { state.selectedByKind[kind] = name; render(); };
      tr.append(el("td", {}, el("strong", {}, name)));
      tr.append(el("td", {}, summarize(kind, r)));
      tb.append(tr);
    }
    tbl.append(tb);
    list.append(tbl);
    panel.append(list);

    // Right: detail
    const detailWrap = el("div", { class: "detail" });
    const selectedResource = rows.find(r => r.metadata.name === selected) || rows[0];
    if (selectedResource) {
      const header = el("div", { class: "detail-header" },
        el("h2", {}, `${kind} · ${selectedResource.metadata.name}`));
      const actions = el("div", { class: "actions" });
      const dispatchMsg = el("span", { class: "small muted", style: "margin-left:.5rem" });
      if (isWorkload) {
        const dispatch = el("button", { class: "action primary" }, "Dispatch");
        dispatch.onclick = async () => {
          dispatchMsg.textContent = "dispatching…";
          try {
            const out = await api(`/v1/dispatch/${kind}/${selectedResource.metadata.name}`, { method: "POST" });
            dispatchMsg.textContent = `running on ${out.node} (instance ${out.instance_id.slice(0,8)}…)`;
            state.logSince[`${kind}/${selectedResource.metadata.name}`] = 0;
          } catch (e) { dispatchMsg.textContent = "✗ " + String(e); }
        };
        actions.append(dispatch);

        const stop = el("button", { class: "action danger" }, "Stop all");
        stop.onclick = async () => {
          if (!confirm(`Stop ALL replicas of ${kind}/${selectedResource.metadata.name}?`)) return;
          dispatchMsg.textContent = "stopping…";
          try {
            const out = await api(`/v1/control/${kind}/${selectedResource.metadata.name}/stop`, { method: "POST" });
            dispatchMsg.textContent = `stopped ${out.stopped} on ${(out.nodes || []).join(", ")}`;
          } catch (e) { dispatchMsg.textContent = "✗ " + String(e); }
        };
        actions.append(stop);

        const restart = el("button", { class: "action" }, "Restart");
        restart.onclick = async () => {
          if (!confirm(`Restart ${kind}/${selectedResource.metadata.name}? (stop + re-dispatch)`)) return;
          dispatchMsg.textContent = "restarting…";
          try {
            const out = await api(`/v1/control/${kind}/${selectedResource.metadata.name}/restart`, { method: "POST" });
            dispatchMsg.textContent = `restarted: stopped ${out.stopped}, dispatched on ${out.node}`;
            state.logSince[`${kind}/${selectedResource.metadata.name}`] = 0;
          } catch (e) { dispatchMsg.textContent = "✗ " + String(e); }
        };
        actions.append(restart);
      }
      const editBtn = el("button", { class: "action" }, "Edit (copy to Apply)");
      editBtn.onclick = () => {
        state.applyDraft = jsonToYaml(selectedResource);
        state.activeTab = "Apply";
        render();
      };
      actions.append(editBtn);
      const delBtn = el("button", { class: "action danger" }, "Delete");
      delBtn.onclick = async () => {
        if (!confirm(`Delete ${kind}/${selectedResource.metadata.name}?`)) return;
        try {
          await api(`/v1/resources/${kind}/${selectedResource.metadata.name}`, { method: "DELETE" });
          delete state.selectedByKind[kind];
          await refresh();
        } catch (e) { alert(String(e)); }
      };
      actions.append(delBtn);
      header.append(actions);
      header.append(dispatchMsg);
      detailWrap.append(header);

      const pre = el("pre", { class: "yaml" });
      pre.innerHTML = colorizeYaml(jsonToYaml(selectedResource));
      detailWrap.append(pre);

      if (isWorkload) {
        detailWrap.append(makeInstancesPanel(kind, selectedResource));
        detailWrap.append(makeLogsPanel(kind, selectedResource.metadata.name));
      }
      if (kind === "Schedule") {
        detailWrap.append(makeSchedulePanel(selectedResource.metadata.name));
      }
    }
    panel.append(detailWrap);

    wrap.append(panel);
    return wrap;
  }

  // ------------------------------------------------------------- instances panel
  function makeInstancesPanel(kind, resource) {
    const name = resource.metadata.name;
    const spec = resource.spec || {};
    const declaredReplicas = spec.replicas ?? 1;
    const runtime = spec.runtime || {};
    const args = runtime.args || [];
    const env = runtime.env || {};
    const exec = runtime.exec || runtime.image || "(no runtime exec)";

    const panel = el("div", { class: "logs-panel" });
    const header = el("div", { class: "logs-header" });
    header.append(el("h3", {}, "Instances"));
    const meta = el("span", { class: "meta" }, "polling…");
    header.append(meta);
    panel.append(header);

    // Spec card — read-only summary from the YAML
    const spec_card = el("div", { class: "logs-tail", style: "max-height: none; padding: .75rem" });
    const rows = [
      ["runtime",      `${runtime.kind || "?"} · ${exec}`],
      ["args",         args.length ? args.map(a => JSON.stringify(a)).join(" ") : "(none)"],
      ["env",          Object.keys(env).length ? Object.entries(env).map(([k,v]) => `${k}=${v}`).join(", ") : "(none)"],
      ["replicas",     String(declaredReplicas)],
      ["restart",      spec.restart_policy || "always"],
    ];
    for (const [k, v] of rows) {
      const row = el("div", { class: "log-row" });
      row.append(el("span", { class: "stream" }, k));
      row.append(el("span", { class: "ts" }, ""));
      row.append(el("span", {}, v));
      spec_card.append(row);
    }
    panel.append(spec_card);

    // Live instance list
    const instances_table = el("table", { style: "margin-top: .75rem; font-size:.78rem" });
    instances_table.append(el("thead", {}, el("tr", {},
      el("th", {}, "Replica"),
      el("th", {}, "Instance id"),
      el("th", {}, "Node"),
      el("th", {}, "First seen"),
      el("th", {}, "Last seen"),
      el("th", {}, "Lines"))));
    const tb = el("tbody");
    tb.append(el("tr", {}, el("td", { colspan: "6", class: "logs-empty" }, "no instances tracked yet — Dispatch to launch")));
    instances_table.append(tb);
    panel.append(instances_table);

    const key = `instances/${kind}/${name}`;
    if (state.logTimers[key]) clearInterval(state.logTimers[key]);

    const poll = async () => {
      try {
        const rows = await api(`/v1/instances/${kind}/${name}`);
        meta.textContent = `${rows.length} of ${declaredReplicas} replica${declaredReplicas===1?'':'s'} tracked`;
        if (!rows.length) {
          tb.innerHTML = "";
          tb.append(el("tr", {}, el("td", { colspan: "6", class: "logs-empty" }, "no instances tracked yet — Dispatch to launch")));
          return;
        }
        tb.innerHTML = "";
        for (const r of rows) {
          const idShort = r.instance_id.slice(0, 8) + "…";
          const first = r.first_seen_at ? new Date(r.first_seen_at).toLocaleTimeString() : "—";
          const last  = r.last_seen_at  ? new Date(r.last_seen_at).toLocaleTimeString() : "—";
          tb.append(el("tr", {},
            el("td", {}, `r${r.replica_index}`),
            el("td", { style: "font-family: ui-monospace, Menlo, monospace" }, idShort),
            el("td", {}, r.node || el("span", { class: "dim" }, "—")),
            el("td", {}, first),
            el("td", {}, last),
            el("td", {}, String(r.line_count))));
        }
      } catch (e) {
        meta.textContent = "✗ " + String(e);
      }
    };
    poll();
    state.logTimers[key] = setInterval(poll, 3000);
    return panel;
  }

        const o = obs[name];
        meta.textContent = o ? `fired ${o.fire_count}× since armed` : "not yet armed";

  // ------------------------------------------------------------- live log viewer
  function makeLogsPanel(kind, name) {
    const key = `${kind}/${name}`;
    const panel = el("div", { class: "logs-panel" });

    const header = el("div", { class: "logs-header" });
    header.append(el("h3", {}, "Logs"));
    const meta = el("span", { class: "meta" }, "polling…");
    header.append(meta);
    panel.append(header);

    const tail = el("div", { class: "logs-tail" });
    tail.innerHTML = '<div class="logs-empty">no logs yet — Dispatch the workload to see its output</div>';
    panel.append(tail);

    // Stop any old timer for this key (re-render replaces the panel).
    if (state.logTimers[key]) clearInterval(state.logTimers[key]);

    let firstFetch = true;
    const poll = async () => {
      try {
        const since = state.logSince[key] || 0;
        const r = await api(`/v1/logs/${kind}/${name}?since=${since}`);
        meta.textContent = `${r.total} line${r.total===1?'':'s'} · live`;
        if (!r.entries.length && firstFetch && r.total === 0) {
          // Keep the empty placeholder.
        } else if (firstFetch || r.entries.length) {
          if (firstFetch) tail.innerHTML = "";
          for (const e of r.entries) {
            const row = el("div", { class: "log-row" });
            const ts = new Date(e.at).toLocaleTimeString(undefined, { hour12: false });
            row.append(el("span", { class: "ts" }, ts));
            row.append(el("span", { class: `stream${e.stream==='stderr'?' err':''}` }, e.stream));
            row.append(el("span", {}, e.line));
            tail.append(row);
          }
          state.logSince[key] = r.total;
          tail.scrollTop = tail.scrollHeight;
        }
        firstFetch = false;
      } catch (e) {
        meta.textContent = "✗ " + String(e);
      }
    };
    poll();
    state.logTimers[key] = setInterval(poll, 2000);
    return panel;
  }

  function summarize(kind, r) {
    const s = r.spec || {};
    switch (kind) {
      case "Service": {
        const rt = s.runtime?.kind || "?";

        return el("span", { class: "small muted" }, `${rt} · ${replicas} replica${replicas===1?"":"s"} · ${s.restart_policy || "always"}`);
      }
      case "Task": {
        const rt = s.runtime?.kind || "?";
        const retry = s.retry?.max_attempts ? `, retry x${s.retry.max_attempts}` : "";
        return el("span", { class: "small muted" }, `${rt}${retry}`);
      }
      case "Dataset":
        return el("span", { class: "small muted" }, `${(s.locations || []).length} location(s) · ${(s.formats || []).join(",") || "–"}`);
      case "Model":
        return el("span", { class: "small muted" }, `${(s.variants || []).length} variant(s) · served by ${(s.served_by || []).length} node(s)`);

  // ------------------------------------------------------------- demo logic
  // Faithful JS reproductions of the Rust matchers. Canonical:
  //   crates/orion-types/src/capability.rs (AttrMatch dispatch + selector)
  //   crates/orion-scheduler/src/lib.rs    (Placement filter)

  const OP_KEYS = new Set(["eq","ne","gt","gte","lt","lte"]);

  function attrMatchVariant(check) {
    if (Array.isArray(check)) return "OneOf";
    if (check && typeof check === "object" && !Array.isArray(check)) {
      const ks = Object.keys(check);
      if (ks.length > 0 && ks.every(k => OP_KEYS.has(k))) return "Op";
    }
    return "Equals";
  }

  function deepEqual(a, b) { return JSON.stringify(a) === JSON.stringify(b); }

  function evalAttrMatch(actual, check) {
    const v = attrMatchVariant(check);
    if (v === "OneOf") {
      return { variant: v, pass: check.some(c => deepEqual(c, actual)), detail: `actual ${JSON.stringify(actual)} in ${JSON.stringify(check)}` };
    }
    if (v === "Op") {
      const checks = [];
      let pass = true;
      if ("eq"  in check) { const ok = deepEqual(actual, check.eq);  pass = pass && ok; checks.push(`eq=${JSON.stringify(check.eq)}:${ok?'✓':'✗'}`); }
      if ("ne"  in check) { const ok = !deepEqual(actual, check.ne); pass = pass && ok; checks.push(`ne=${JSON.stringify(check.ne)}:${ok?'✓':'✗'}`); }
      if ("gt"  in check) { const ok = Number(actual) >  check.gt;   pass = pass && ok; checks.push(`gt=${check.gt}:${ok?'✓':'✗'}`); }
      if ("gte" in check) { const ok = Number(actual) >= check.gte;  pass = pass && ok; checks.push(`gte=${check.gte}:${ok?'✓':'✗'}`); }
      if ("lt"  in check) { const ok = Number(actual) <  check.lt;   pass = pass && ok; checks.push(`lt=${check.lt}:${ok?'✓':'✗'}`); }
      if ("lte" in check) { const ok = Number(actual) <= check.lte;  pass = pass && ok; checks.push(`lte=${check.lte}:${ok?'✓':'✗'}`); }
      return { variant: v, pass, detail: `actual=${JSON.stringify(actual)} ${checks.join(',')}` };
    }
    return { variant: "Equals", pass: deepEqual(actual, check), detail: `actual=${JSON.stringify(actual)} == ${JSON.stringify(check)}` };
  }

  function matchSelector(advertised, selector) {
    const results = [];
    for (const [capName, attrChecks] of Object.entries(selector || {})) {
      const cap = (advertised || []).find(c => c.name === capName);
      if (!cap) {
        results.push({ capName, attrName: "(name)", pass: false, detail: `no advertised capability '${capName}'` });
        continue;
      }
      for (const [attrName, check] of Object.entries(attrChecks || {})) {
        const actual = (cap.attributes || {})[attrName];
        if (actual === undefined) {
          results.push({ capName, attrName, pass: false, detail: `advertisement is missing attribute '${attrName}'` });
          continue;
        }
        const r = evalAttrMatch(actual, check);
        results.push({ capName, attrName, pass: r.pass, detail: `${r.variant}: ${r.detail}` });
      }
    }
    return { results, allPass: results.length > 0 && results.every(r => r.pass) };
  }

  function matchPlacement(nodes, placement) {
    return (nodes || []).map(n => {
      const fails = [];
      if (Array.isArray(placement.arch) && placement.arch.length && !placement.arch.includes(n.arch)) {
        fails.push(`arch ${n.arch} not in ${JSON.stringify(placement.arch)}`);
      }
      if (Array.isArray(placement.os) && placement.os.length && !placement.os.includes(n.os)) {
        fails.push(`os ${n.os} not in ${JSON.stringify(placement.os)}`);
      }
      if (placement.gpu) {
        const gs = n.gpus || [];
        const ok = gs.some(g => {
          if (placement.gpu.vendor && g.vendor !== placement.gpu.vendor) return false;
          if (placement.gpu.min_vram_gb != null && g.vram_gb < placement.gpu.min_vram_gb) return false;
          return true;
        });
        if (!ok) fails.push(`no GPU matching ${JSON.stringify(placement.gpu)}`);
      }
      for (const [k, v] of Object.entries(placement.node_labels || {})) {
        if ((n.labels || {})[k] !== v) fails.push(`label ${k} expected '${v}', got '${(n.labels||{})[k] ?? '(missing)'}'`);
      }
      return { node_id: n.node_id, pass: fails.length === 0, fails };
    });
  }

  function makeSystemCard() {
    const card = makeCard("System overview", "/v1/diag/system — controller + agents + instances + NATS + logs at a glance.");
    const body = el("pre", { class: "yaml", style: "max-height: 360px" });
    body.textContent = "loading…";
    card.append(body);
    const refresh = async () => {
      try {
        const d = await api("/v1/diag/system");
        const ctrl = d.controller || {};
        const upMin = Math.floor((ctrl.uptime_seconds || 0) / 60);
        const lines = [
          `controller       v${ctrl.version}  uptime ${upMin}m  auth=${ctrl.auth_disabled ? "disabled" : "enforced"}`,
          `nats             ${ctrl.nats_url}  ${d.nats?.connected ? "✓ connected" : "✗ disconnected"}`,
          ``,
          `nodes            ${(d.nodes||[]).length} total, ${d.agents} live (last seen <30s)`,
        ];
        for (const n of d.nodes || []) {
          const fresh = n.seconds_since_seen < 30 ? "✓" : "stale";
          lines.push(`  ${n.node_id.padEnd(14)} v${n.agent_version}  ${fresh}  ${n.seconds_since_seen}s since last seen`);
        }
        lines.push(``);
        lines.push(`instances        ${d.instances.total} total`);
        for (const w of d.instances.by_workload || []) {
          lines.push(`  ${w.kind}/${w.name}  ×${w.instance_count}`);
        }
        lines.push(``);
        lines.push(`schedules        armed=${d.schedules.armed}  fired_total=${d.schedules.fired_total}`);
        lines.push(`logs             ${d.logs.buffered_lines} lines across ${d.logs.workloads_with_logs} workload(s)`);
        body.textContent = lines.join("\n");
      } catch (e) {
        body.textContent = "error: " + e;
      }
    };
    refresh();
    state.logTimers["diag-system"] = setInterval(refresh, 5000);
    return card;
  }

  function makeLogSearchCard() {
    const card = makeCard("Log search", "/v1/logs/search?q=… — substring across every workload's log ring. Filter by kind / name.");
    const row = el("div", { class: "apply-buttons", style: "margin-bottom: .5rem" });
    const q = el("input", { type: "text", placeholder: "substring (e.g. 'recv:' or 'error')", style: "flex:2; padding:.4rem; border:1px solid var(--line); border-radius:4px; font-family: ui-monospace, Menlo, monospace; font-size:.85rem" });
    const kind = el("input", { type: "text", placeholder: "kind (optional)", style: "flex:1; padding:.4rem; border:1px solid var(--line); border-radius:4px" });
    const name = el("input", { type: "text", placeholder: "name (optional)", style: "flex:1; padding:.4rem; border:1px solid var(--line); border-radius:4px" });
    const btn = el("button", { class: "action primary" }, "Search");
    row.append(q, kind, name, btn);
    card.append(row);

    const out = el("div", { class: "logs-tail", style: "max-height: 320px" });
    out.innerHTML = '<div class="logs-empty">enter a substring and press Search</div>';
    card.append(out);

    const search = async () => {
      const params = new URLSearchParams();
      params.set("q", q.value);
      if (kind.value) params.set("kind", kind.value);
      if (name.value) params.set("name", name.value);
      params.set("limit", "100");
      try {
        const hits = await api("/v1/logs/search?" + params);
        if (!hits.length) {
          out.innerHTML = `<div class="logs-empty">no matches for '${q.value}'</div>`;
          return;
        }
        out.innerHTML = "";
        for (const h of hits) {
          const r = el("div", { class: "log-row" });
          r.append(el("span", { class: "ts" }, h.at.slice(11,19)));
          r.append(el("span", { class: "stream" }, `${h.kind}/${h.name}`));
          r.append(el("span", {}, h.line));
          out.append(r);
        }
      } catch (e) {
        out.innerHTML = `<div class="logs-empty">error: ${e}</div>`;
      }
    };
    btn.onclick = search;
    q.onkeydown = (e) => { if (e.key === "Enter") search(); };
    return card;
  }

  function demoCardIpc() {
    const card = makeCard(
      "IPC demo — two Services talking over NATS",
      "Apply demo-pub + demo-sub Services (orion-demo-pub publishes \"tick N at HH:MM:SS\" every second on the orion.demo.ipc subject; orion-demo-sub subscribes and prints). The mesh's own NATS broker carries the messages.");

    const status = el("div", { class: "small muted", style: "margin-bottom:.5rem" });
    card.append(status);

    const split = el("div", { class: "row", style: "margin-top:.5rem" });
    const left = el("div");
    left.append(el("label", {}, "Publisher (demo-pub) stdout"));
    const pubBox = el("div", { class: "logs-tail", style: "max-height: 180px" });
    pubBox.innerHTML = '<div class="logs-empty">no data yet</div>';
    left.append(pubBox);
    const right = el("div");
    right.append(el("label", {}, "Subscriber (demo-sub) stdout"));
    const subBox = el("div", { class: "logs-tail", style: "max-height: 180px" });
    subBox.innerHTML = '<div class="logs-empty">no data yet</div>';
    right.append(subBox);
    split.append(left, right);
    card.append(split);

    let pollTimer = null;

    const renderLogs = async (box, name) => {
      try {
        const r = await api(`/v1/logs/Service/${name}`);
        if (!r.entries.length) {
          box.innerHTML = '<div class="logs-empty">no logs yet</div>';
          return;
        }
        box.innerHTML = "";
        for (const e of r.entries.slice(-30)) {
          const row = el("div", { class: "log-row" });
          const ts = new Date(e.at).toLocaleTimeString(undefined, { hour12: false });
          row.append(el("span", { class: "ts" }, ts));
          row.append(el("span", { class: `stream${e.stream==='stderr'?' err':''}` }, e.stream));
          row.append(el("span", {}, e.line));
          box.append(row);
        }
        box.scrollTop = box.scrollHeight;
      } catch (e) {
        box.innerHTML = `<div class="logs-empty">error: ${e}</div>`;
      }
    };

    const startPolling = () => {
      if (pollTimer) clearInterval(pollTimer);
      const poll = () => {
        renderLogs(pubBox, "demo-pub");
        renderLogs(subBox, "demo-sub");
      };
      poll();
      pollTimer = setInterval(poll, 2000);
      // Track in state.logTimers so it gets cleared on tab switch.
      state.logTimers["demo-ipc"] = pollTimer;
    };

    const buttons = el("div", { style: "display:flex; gap:.5rem; margin-top:.75rem" });

    const startBtn = el("button", { class: "action primary" }, "Apply + Dispatch both");
    startBtn.onclick = async () => {
      status.textContent = "applying demo-sub…";
      try {
        await api("/v1/resources/apply", { method: "POST", headers: { "content-type": "application/yaml" }, body: IPC_SUB_YAML });
        status.textContent = "applying demo-pub…";
        await api("/v1/resources/apply", { method: "POST", headers: { "content-type": "application/yaml" }, body: IPC_PUB_YAML });
        status.textContent = "dispatching demo-sub…";
        await api("/v1/dispatch/Service/demo-sub", { method: "POST" });
        // Give the subscriber a moment to connect before the publisher starts firing.
        await new Promise(r => setTimeout(r, 600));
        status.textContent = "dispatching demo-pub…";
        await api("/v1/dispatch/Service/demo-pub", { method: "POST" });
        status.textContent = "running — watch both log streams below";
        startPolling();
        await refresh();
      } catch (e) {
        status.textContent = "✗ " + String(e);
      }
    };
    buttons.append(startBtn);

    const watchBtn = el("button", { class: "action" }, "Watch (don't re-dispatch)");
    watchBtn.onclick = () => {
      status.textContent = "watching existing instances";
      startPolling();
    };
    buttons.append(watchBtn);

    const stopBtn = el("button", { class: "action danger" }, "Stop + clear");
    stopBtn.onclick = async () => {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = null;
      status.textContent = "stopping…";
      try {
        // Best-effort: delete both Services. The agent doesn't yet expose a stop-by-name
        // endpoint, but deleting the resource is what the reconciler would observe.
        // The running processes stay alive until the agent ends (Phase A handler also
        // accepts ControlStop by instance_id; not wired into the UI yet).
        await api("/v1/resources/Service/demo-pub", { method: "DELETE" }).catch(() => {});
        await api("/v1/resources/Service/demo-sub", { method: "DELETE" }).catch(() => {});
        status.textContent = "Resources deleted. Restart the agent to halt the running processes.";
        pubBox.innerHTML = '<div class="logs-empty">cleared</div>';
        subBox.innerHTML = '<div class="logs-empty">cleared</div>';
        await refresh();
      } catch (e) {
        status.textContent = "✗ " + String(e);
      }
    };
    buttons.append(stopBtn);

    card.append(buttons);
    return card;
  }

  function demoCardAttrMatch() {
    const card = makeCard(
      "AttrMatch dispatch",
      "Paste any JSON value; see which AttrMatch variant the selector deserializer picks for it.");
    const ta = el("textarea", { rows: 3, style: "min-height: 60px" });
    ta.value = `{ "gte": 24 }`;
    card.append(ta);

    const out = el("div", { class: "verdict neutral" });
    card.append(out);

    const samples = el("div", { class: "small muted", style: "margin-top: .5rem" });
    for (const [label, val] of [
      ["bare string", `"amiga_schematics"`],
      ["bare number", `12`],
      ["array", `["pdf", "png"]`],
      ["op {gte}", `{ "gte": 24 }`],
      ["op {lt, gt}", `{ "gt": 0, "lt": 100 }`],
      ["object (non-op)", `{ "vendor": "nvidia", "min_vram_gb": 24 }`],
      ["object {}", `{}`],
    ]) {
      const a = el("a", { href: "#" }, label);
      a.onclick = (e) => { e.preventDefault(); ta.value = val; evaluate(); };
      samples.append(a, " · ");
    }
    card.append(samples);

    const evaluate = () => {
      try {
        const v = JSON.parse(ta.value);
        const variant = attrMatchVariant(v);
        const explanations = {
          OneOf: "JSON array → matches if the advertised attribute is one of these values",
          Op:    "Object whose keys are all comparison ops → applies the numeric/equality ops",
          Equals: "Anything else → exact deep-equality with the advertised attribute",
        };
        out.className = "verdict match";
        out.innerHTML = `<strong>→ ${variant}</strong><br><span class="small">${explanations[variant]}</span>`;
      } catch (e) {
        out.className = "verdict nomatch";
        out.textContent = "JSON parse error: " + e.message;
      }
    };
    ta.oninput = evaluate;
    setTimeout(evaluate, 0);
    return card;
  }

      const lines = status.querySelectorAll(".bulk-step");
      for (let i = 0; i < DEMO_SET.length; i++) {
        const [label, , , yaml] = DEMO_SET[i];
        const line = lines[i];
        try {
          const r = await api("/v1/resources/apply", {
            method: "POST",
            headers: { "content-type": "application/yaml" },
            body: yaml,
          });
          line.innerHTML = `<span class="ok">✓</span> ${label} — generation ${r.generation}`;
        } catch (e) {
          line.innerHTML = `<span class="fail">✗</span> ${label} — ${e.message}`;
          break;
        }
      }
      await refresh();
    };
    buttons.append(applyBtn);

    const clearBtn = el("button", { class: "action danger" }, "Clear demo");
    clearBtn.onclick = async () => {
      if (!confirm(`Delete all demo resources (${DEMO_SET.length} items prefixed 'demo-')?`)) return;
      renderInitial();
      const lines = status.querySelectorAll(".bulk-step");
      for (let i = 0; i < DEMO_SET.length; i++) {
        const [label, kind, name] = DEMO_SET[i];
        const line = lines[i];
        try {
          await api(`/v1/resources/${kind}/${name}`, { method: "DELETE" });
          line.innerHTML = `<span class="ok">✓</span> deleted ${kind}/${name}`;
        } catch (e) {
          if (String(e).includes("404")) {
            line.innerHTML = `<span class="pending">·</span> ${kind}/${name} — wasn't there`;
          } else {
            line.innerHTML = `<span class="fail">✗</span> ${label} — ${e.message}`;
          }
        }
      }
      await refresh();
    };
    buttons.append(clearBtn);

    card.append(buttons);
    return card;
  }

  // ------------------------------------------------------------- boot
  refresh();
  setInterval(refresh, 3000);
</script>
</body>
</html>
