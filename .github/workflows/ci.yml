name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    services:
      nats:
        image: nats:2.10
        ports: [4222:4222]
        options: --health-cmd "wget -qO- http://localhost:8222/healthz" --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace
      - name: Run tests (default features)
        run: cargo test --workspace
      - name: Run tests (with --features wasm)
        run: cargo test -p orion-runtime --features wasm
      - name: Run ignored docker test if daemon available
        run: |
          if docker version >/dev/null 2>&1; then
            cargo test -p orion-runtime -- --ignored docker_adapter_launches_hello_world
          else
            echo "docker not available — skipping"
          fi
